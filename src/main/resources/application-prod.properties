spring.application.name=SplitEase


# Production Database Example (PostgreSQL)
# We prepend jdbc: to handle standard postgresql:// URLs gracefully
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://postgres:5432/splitease}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console
spring.h2.console.enabled=false

# Server
server.port=${SERVER_PORT:8080}
