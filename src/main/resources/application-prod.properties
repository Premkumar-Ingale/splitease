spring.application.name=SplitEase

# Set active profile to prod (though usually set via env variable)
spring.profiles.active=prod

# Production Database Example (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/splitease}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console
spring.h2.console.enabled=false

# Server
server.port=${SERVER_PORT:8080}
